name: olist
version: "1.0.0"
config-version: 2

profile: olist

model-paths:  ["models"]
test-paths:   ["tests"]
seed-paths:   ["seeds"]
macro-paths:  ["macros"]
target-path:  "target"
clean-targets: ["target", "dbt_packages"]

models:
  olist:
    staging:
      +schema:      staging
      +materialized: view          # views — cheap, always fresh
    intermediate:
      +schema:      intermediate
      +materialized: table         # tables — joins are expensive to rerun
    marts:
      +schema:      marts
      +materialized: table
      +post-hook:
        - "grant select on {{ this }} to group olist_readers"
