name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Lint & static checks ───────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev deps
        run: pip install ruff

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  # ── Unit tests ─────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          USE_DUCKDB: "true"
          DATA_DIR: tests/fixtures

  # ── dbt parse (validates DAG + SQL syntax, no DB connection needed) ────────
  dbt-compile:
    name: dbt compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dbt
        # Must match dbt-core==1.8.3 in requirements.txt
        run: pip install "dbt-duckdb==1.8.*" "dbt-core==1.8.*"

      - name: dbt parse (validates all SQL and refs without a live DB)
        working-directory: dbt_project
        run: dbt parse --profiles-dir . --target ci
        env:
          DBT_TARGET: ci
