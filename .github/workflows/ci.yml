name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Ruff format (auto-apply, then fail if diff)
        run: |
          ruff format .
          git diff --exit-code || (echo "Files were reformatted — run 'ruff format .' locally and commit" && exit 1)

      - name: Ruff lint
        run: ruff check .

  # ── Unit tests ─────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          USE_DUCKDB: "true"
          DATA_DIR: tests/fixtures

  # ── dbt parse ─────────────────────────────────────────────────────────────
  dbt-parse:
    name: dbt parse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dbt
        run: pip install "dbt-duckdb==1.8.*" "dbt-core==1.8.*"

      - name: dbt seed (loads CI gold stubs into DuckDB)
        working-directory: dbt_project
        run: dbt seed --profiles-dir . --target ci
        env:
          DBT_TARGET: ci

      - name: dbt parse (validates DAG and SQL syntax)
        working-directory: dbt_project
        run: dbt parse --profiles-dir . --target ci
        env:
          DBT_TARGET: ci
