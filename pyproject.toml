[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [
    "notebooks/",       # Jupyter cells have non-standard import order by design
    ".git",
    "__pycache__",
]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP"]
ignore = [
    "E501",   # line too long
    "E402",   # module-level import not at top — normal in scripts with sys.path setup
]

[tool.ruff.lint.per-file-ignores]
"ml/*.py"              = ["I001"]   # multi-line imports sorted correctly
"dashboard/pages/*.py" = ["I001", "E402"]  # sys.path.insert must precede local imports
"etl/*.py"             = ["I001"]   # pyspark imports after conditional awsglue block

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "--tb=short -q"
